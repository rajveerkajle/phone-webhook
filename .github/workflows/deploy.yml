name: Deploy webhook to cloud run

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-22.04

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/433552400758/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: sa-cidcd-webhook-deployer@learning-486607.iam.gserviceaccount.com
          audience: "https://token.actions.githubusercontent.com"

      - name: Configure gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: learning-486607

      - name: configure docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build docker image
        run: |
          IMAGE="us-central1-docker.pkg.dev/learning-486607/cloud-run-source-deploy/webhook-cicd:${{ github.sha }}"
          docker build -t "$IMAGE" .

      - name: push docker image
        run: |
          IMAGE="us-central1-docker.pkg.dev/learning-486607/cloud-run-source-deploy/webhook-cicd:${{ github.sha }}"
          docker push "$IMAGE"
      - name: deploy to cloud run
        run: |
          IMAGE="us-central1-docker.pkg.dev/learning-486607/cloud-run-source-deploy/webhook-cicd:${{ github.sha }}"
          gcloud run deploy webhook-cicd \
            --image "$IMAGE" \
            --region us-central1 \
            --service-account sa-webhook-runtime@learning-486607.iam.gserviceaccount.com \
            --platform managed \
            --allow-unauthenticated

        
